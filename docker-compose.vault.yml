# Optional overlay: fetch secrets from HashiCorp Vault instead of ./secrets/*.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.vault.yml up -d
#
# What this adds:
#   - `vault`         : a Vault server (dev mode here; swap for Raft/Consul in prod)
#   - `vault-agent`   : a sidecar that authenticates via AppRole, renders secret
#                       files into a shared tmpfs, and keeps them refreshed
#   - bot             : mounts the tmpfs at /run/secrets and no longer needs
#                       ./secrets/*.txt
#
# The bot's secrets loader (src/config/secrets.js) is unchanged — it reads
# from $SECRETS_DIR (default /run/secrets). All that changes is who writes
# those files.
#
# This file is intentionally minimal. In production you would:
#   1. Replace dev-mode Vault with a real backend (Consul, Raft) and unseal.
#   2. Store AppRole role_id / secret_id in a secure initial-secret channel
#      (not committed; bootstrapped via your infra CI or Terraform).
#   3. Lock down the network so only vault-agent can reach Vault.

services:
  vault:
    image: hashicorp/vault:latest
    container_name: summarizer-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-dev-only-change-me}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    volumes:
      - vault-data:/vault/file
    networks:
      - backend
    # No ports published — vault-agent reaches it via the compose network.
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 20

  vault-agent:
    image: hashicorp/vault:latest
    container_name: summarizer-vault-agent
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
    volumes:
      - ./vault/agent.hcl:/etc/vault/agent.hcl:ro
      - ./vault/templates:/etc/vault/templates:ro
      - vault-rendered-secrets:/run/secrets
    networks:
      - backend
    command: ["agent", "-config=/etc/vault/agent.hcl"]

  bot:
    # The bot now reads secrets written by vault-agent into this tmpfs volume
    # instead of from the file: -mounted docker secrets.
    volumes:
      - vault-rendered-secrets:/run/secrets:ro
    # Disable the docker-native secrets here — vault-agent is authoritative.
    secrets: []

volumes:
  vault-data:
  vault-rendered-secrets:
    driver_opts:
      # tmpfs ensures rendered secrets never touch disk.
      type: tmpfs
      device: tmpfs
