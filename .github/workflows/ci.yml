name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  node:
    name: Node syntax + deps
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install production deps
        run: npm ci --omit=dev --no-audit --no-fund

      - name: Syntax check all source files
        run: |
          set -euo pipefail
          mapfile -d '' -t files < <(find src -name '*.js' -print0)
          for f in "${files[@]}"; do
            node --check "$f"
          done

  docker:
    name: Docker build (multi-stage)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push, cache from GHCR if available)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ai-call-summarizer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify the image runs and has whisper-cli
        run: |
          docker run --rm ai-call-summarizer:ci /usr/local/bin/whisper-cli --help \
            | head -n 1
