name: nexus

# Stack layout:
#   oracle             – Python FastAPI service (the brain)
#   discord-adapter    – Node.js Discord bot (per-speaker Opus capture)
#   slack-adapter      – Node.js Slack bot (channel digests)
#   postgres           – Primary database
#   ollama             – Local LLM engine
#   whisper-models-init – One-shot model downloader
#   ollama-models-init  – One-shot model puller
#
# Networking: all services on internal bridge `nexus_backend`.
# Persistence: named volumes for DB data, models, and bot scratch files.
#
# Quick start:
#   cp .env.example .env  # fill in tokens
#   docker compose up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # ── Database ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus}
      POSTGRES_DB: nexus
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - backend
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Oracle (Python FastAPI) ────────────────────────────────────────────
  oracle:
    build:
      context: ./oracle
      dockerfile: Dockerfile
    image: ${ORACLE_IMAGE:-nexus-oracle:local}
    container_name: nexus-oracle
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://nexus:${POSTGRES_PASSWORD:-nexus}@postgres:5432/nexus
      JWT_SECRET: ${JWT_SECRET:-CHANGE-ME-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LLM_DEFAULT_BASE_URL: http://ollama:11434
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-llama3.1}
    ports:
      - "${ORACLE_PORT:-8000}:8000"
    networks:
      - backend
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Discord Adapter (Node.js) ──────────────────────────────────────────
  discord-adapter:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${BOT_IMAGE:-nexus-discord:local}
    container_name: nexus-discord
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      whisper-models-init:
        condition: service_completed_successfully
      ollama:
        condition: service_healthy
      ollama-models-init:
        condition: service_completed_successfully
      oracle:
        condition: service_healthy
    environment:
      NODE_ENV: production
      WHISPER_CPP_BIN: /usr/local/bin/whisper-cli
      WHISPER_MODELS_DIR: /opt/whisper-models
      LLM_DEFAULT_BASE_URL: http://ollama:11434
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-llama3.1}
      ORACLE_URL: http://oracle:8000
      USE_ORACLE: ${USE_ORACLE:-false}
    volumes:
      - bot-data:/app/data
      - whisper-models:/opt/whisper-models:ro
    networks:
      - backend
    logging: *default-logging
    healthcheck:
      test: ["CMD", "test", "-f", "/app/data/bot.db"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 30s

  # ── AI Services ────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: "24h"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - backend
    logging: *default-logging
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  whisper-models-init:
    image: debian:bookworm-slim
    container_name: nexus-whisper-init
    restart: "no"
    environment:
      WHISPER_MODELS: ${WHISPER_MODELS:-tiny.en base.en small.en}
    volumes:
      - whisper-models:/models
    networks:
      - backend
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends curl ca-certificates >/dev/null
        mkdir -p /models
        for m in $${WHISPER_MODELS}; do
          f="/models/ggml-$${m}.bin"
          if [ -f "$${f}" ]; then
            echo "[whisper-init] exists: $${f}"
            continue
          fi
          echo "[whisper-init] downloading $${m}..."
          curl -fsSL --retry 5 --retry-delay 3 \
            -o "$${f}" \
            "https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-$${m}.bin"
          echo "[whisper-init] done: $${f}"
        done
        echo "[whisper-init] all models ready"

  ollama-models-init:
    image: ollama/ollama:latest
    container_name: nexus-ollama-init
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODELS_TO_PULL: ${OLLAMA_MODELS:-llama3.1}
    networks:
      - backend
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        for m in $${OLLAMA_MODELS_TO_PULL}; do
          echo "[ollama-init] ensuring model: $${m}"
          ollama pull "$${m}"
        done
        echo "[ollama-init] all models ready"

networks:
  backend:
    driver: bridge
    name: nexus_backend

volumes:
  pg-data:
    name: nexus_pg_data
  bot-data:
    name: nexus_bot_data
  whisper-models:
    name: nexus_whisper_models
  ollama-models:
    name: nexus_ollama_models
